<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoVN — Bản đồ hành chính Việt Nam</title>
  <meta name="description" content="Bản đồ GIS đơn vị hành chính Việt Nam: 34 tỉnh/thành và 3.321 xã/phường." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header class="brand">
        <h1>GeoVN</h1>
        <p>Bản đồ hành chính Việt Nam</p>
      </header>

      <section class="panel">
        <label class="field">
          <span>Tìm kiếm</span>
          <input id="search" type="search" placeholder="Tỉnh, xã, phường…" autocomplete="off" />
        </label>
        <div id="search-results" class="search-results" hidden></div>
      </section>

      <section class="panel">
        <h2>Lớp hiển thị</h2>
        <label class="check"><input type="checkbox" id="layer-provinces" checked /> Tỉnh / Thành phố (34)</label>
        <label class="check"><input type="checkbox" id="layer-wards" checked /> Xã / Phường / Đặc khu (3.321)</label>
        <label class="check"><input type="checkbox" id="layer-labels" checked /> Nhãn tên (tỉnh / xã-phường)</label>
      </section>

      <section class="panel">
        <h2>Chế độ xem</h2>
        <div class="mode-row">
          <button type="button" class="mode active" data-mode="both">Cả hai cấp</button>
          <button type="button" class="mode" data-mode="province">Chỉ tỉnh</button>
          <button type="button" class="mode" data-mode="ward">Chỉ xã/phường</button>
        </div>
      </section>

      <section class="panel" id="info-panel">
        <h2>Thông tin</h2>
        <div id="info" class="info empty">Chọn một đơn vị trên bản đồ</div>
      </section>

      <section class="panel tree-panel">
        <h2>Danh sách đơn vị</h2>
        <div id="tree" class="tree"></div>
      </section>

      <footer class="credit">
        Nguồn GIS:
        <a href="https://github.com/thanglequoc/vietnamese-provinces-database" target="_blank" rel="noopener">vietnamese-provinces-database</a>
        (MIT)
      </footer>
    </aside>

    <main id="map-wrap">
      <div id="map"></div>
      <div id="loader" class="loader">
        <div class="loader-card">
          <div class="spinner"></div>
          <p id="loader-text">Đang tải dữ liệu GIS…</p>
          <div class="progress"><div id="progress-bar"></div></div>
        </div>
      </div>
      <button type="button" id="toggle-sidebar" aria-label="Thu gọn sidebar">☰</button>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="js/app.js"></script>
</body>
</html>
